<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Agent Game Harness — /game</title>
    <link rel="stylesheet" href="/shared/styles.css" />
  </head>
  <body class="page page-game">
    <header class="game__header">
      <a class="game__back" href="/">← brief</a>
      <h1 class="game__title">/game</h1>
      <a class="game__status" href="/status">status →</a>
    </header>

    <main class="game__main">
      <!--
        The ScummVM wasm runtime mounts into #scumm-stage. The fork's
        Emscripten target is expected to render into the canvas and call
        window.__scummPublish(snapshot) for each state update. If the
        fork build is missing, a banner explains how to build it.
      -->
      <section class="game__stage-wrap">
        <div id="scumm-stage" class="game__stage">
          <canvas id="scumm-canvas" width="640" height="400"></canvas>
          <div id="scumm-overlay" class="game__overlay" aria-hidden="true"></div>
          <div id="scumm-missing" class="game__missing" hidden>
            <h2>ScummVM runtime not built</h2>
            <p>
              Run <code>./scripts/build-scummvm.sh</code> to clone and
              build the <code>scummvm-agent</code> fork on branch
              <code>poc/agent-telemetry</code>, then reload this page.
            </p>
          </div>
        </div>
        <aside id="scumm-panel" class="game__panel" aria-live="polite">
          <!-- state-panel.js fills this -->
        </aside>
      </section>
    </main>

    <!--
      Authoritative latest state, mirrored as JSON in the DOM.
      Agents: read window.__scummState first, fall back to this node.
    -->
    <script id="scumm-state" type="application/json">
{
  "frame": 0,
  "room": 0,
  "sceneName": null,
  "ego": { "x": 0, "y": 0, "walking": false },
  "activeVerb": null,
  "hover": { "objectId": null, "name": null },
  "sentenceLine": "",
  "inventory": [],
  "dialogChoices": [],
  "objects": []
}
    </script>

    <script type="module" src="/shared/bridge.js"></script>
    <script type="module" src="/shared/overlay.js"></script>
    <script type="module" src="/shared/state-panel.js"></script>

    <!--
      The fork's emscripten bundle is expected at
      /public/scummvm/scummvm.js. It should call
      window.__scummPublish(snapshot) from the C++/JS bridge.
      We load it last so bridge.js has already installed
      window.__scummPublish.
    -->
    <script>
      (function loadScummvmRuntime() {
        const s = document.createElement("script");
        s.src = "/public/scummvm/scummvm.js";
        s.async = true;
        s.onerror = function () {
          const missing = document.getElementById("scumm-missing");
          if (missing) missing.hidden = false;
        };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
